name: inspect
on:
  push:
jobs:
  inspect:
    name: inspect
    runs-on: ubuntu-latest
    steps:
      - name: inspect
        run: |
          set -x
          df -h .
          sudo apt remove -y microsoft-edge-stable azure-cli google-cloud-cli google-chrome-stable firefox powershell snapd google-cloud-cli-anthoscli 'mysql-server-core-*' '*temurin*' '*jdk*'
          sudo apt autoremove -y
          sudo apt clean -y
          df -h .
          sudo apt update
          sudo apt install -y debian-goodies
          dpigs -n 20 -H
