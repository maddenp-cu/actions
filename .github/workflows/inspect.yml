name: inspect
on:
  push:
jobs:
  inspect:
    name: inspect
    runs-on: ubuntu-latest
    steps:
      - name: inspect
        run: |
          set -x
          df -h .
          dpkg-query -W -f='${Installed-Size;10} ${Package}\n' | sort -nr | head -n20
          sudo apt autoremove -y
          sudo apt clean -y
          df -h .
